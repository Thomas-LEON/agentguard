name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[gemini]" pytest pytest-cov ruff mypy

      - name: Lint with Ruff
        run: ruff check agentguard/ tests/

      - name: Type check
        run: mypy agentguard/

      - name: Run tests
        run: pytest tests/ -m "not integration" --cov=agentguard --cov-report=xml -v
        env:
          # Tests run with use_semantic_judge=False so no real API key is needed
          GEMINI_API_KEY: "dummy_key_for_ci"

      - name: Run Docker sandbox integration tests
        run: pytest tests/test_docker_integration.py -m integration -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
